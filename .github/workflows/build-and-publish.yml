name: Build and publish Caddy with L4 module

on:
  schedule:
    - cron: '0 22 * * *'
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      needs-updating: ${{ steps.check.outputs.needs-updating }}
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: "https://ghcr.io"
          username: zhiayang
          password: ${{ secrets.GHCR_PAT_TOKEN }}

      - name: Check for updates
        id: check
        uses: lucacome/docker-image-update-checker@v3.1.0
        with:
          base-image: "docker.io/library/caddy:alpine"
          image: "ghcr.io/zhiayang/caddy-l4-image:latest"
          platforms: linux/amd64,linux/arm64

  build:
    needs: check
    runs-on: ubuntu-latest
    if: needs.check.outputs.needs-updating == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          push: true
          tags: ghcr.io/zhiayang/caddy-l4-image:latest
          platforms: linux/amd64,linux/arm64
